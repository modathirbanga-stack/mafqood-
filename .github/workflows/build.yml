- name: Build APK
        working-directory: /tmp/fresh_app
        run: flutter build apk --debug --no-tree-shake-icons

      - uses: actions/upload-artifact@v4
        with:
          name: mafqood-apk
          path: /tmp/fresh_app/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30
