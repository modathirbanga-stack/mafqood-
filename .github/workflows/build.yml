- name: Build APK
        working-directory: /tmp/fresh_app
        run: |
          flutter build apk --debug \
            --target-platform android-arm64 \
            --split-per-abi \
            --no-tree-shake-icons
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mafqood-apk
          path: /tmp/fresh_app/build/app/outputs/flutter-apk/app-debug-arm64-v8a.apk
          retention-days: 30
